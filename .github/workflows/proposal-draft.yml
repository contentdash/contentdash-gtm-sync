name: Proposal Draft

on:
  schedule:
    - cron: '0 0 * * 1-5'  # Mon–Fri 8:00am PHT (UTC+8 = 00:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Send proposal drafts
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FLEIRE: ${{ secrets.EMAIL_FLEIRE }}
          EMAIL_CHARLENE: ${{ secrets.EMAIL_CHARLENE }}
          TESTING_MODE: 'false'
        run: node proposal-draft.js

      - name: Commit updated automation state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation-state.json
          git diff --staged --quiet || git commit -m "chore: update automation state [skip ci]"
          git push

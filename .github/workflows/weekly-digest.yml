name: Weekly Ops Digest

on:
  schedule:
    - cron: '3 0 * * 1'  # Monday 8:03am PHT (UTC+8 = Monday 00:03 UTC)
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write          # needed to commit mrr-history.json back to repo

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: node test.js

      - name: Run weekly digest
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          XERO_CLIENT_ID: ${{ secrets.XERO_CLIENT_ID }}
          XERO_CLIENT_SECRET: ${{ secrets.XERO_CLIENT_SECRET }}
          XERO_REDIRECT_URI: ${{ secrets.XERO_REDIRECT_URI }}
          XERO_TOKENS_JSON: ${{ secrets.XERO_TOKENS_JSON }}
          EMAIL_FLEIRE: ${{ secrets.EMAIL_FLEIRE }}
          EMAIL_CHARLENE: ${{ secrets.EMAIL_CHARLENE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          TESTING_MODE: 'false'
        run: node weekly-digest.js

      - name: Commit MRR history
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add mrr-history.json
          git diff --staged --quiet || git commit -m "chore: update MRR history [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rotate Xero tokens secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_PAT }}
        run: |
          if [ -f /tmp/xero-tokens-fresh.json ] && [ -n "$GH_TOKEN" ]; then
            gh secret set XERO_TOKENS_JSON --repo contentdash/contentdash-gtm-sync \
              < /tmp/xero-tokens-fresh.json \
              && echo "✓ XERO_TOKENS_JSON rotated" \
              || echo "⚠ Rotation failed — ensure GH_REPO_PAT has Secrets:write permission"
          else
            echo "ℹ Xero rotation skipped (no fresh tokens or GH_REPO_PAT not set)"
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-digest-${{ github.run_id }}
          path: output/
          retention-days: 30
name: Inbound Lead Alert

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 min — silent when no new leads
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check for new leads
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          PIPELINE_WEBHOOK_TOKEN: ${{ secrets.PIPELINE_WEBHOOK_TOKEN }}
        run: node lead-alert.js

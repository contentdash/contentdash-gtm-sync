name: EOW Reminder

on:
  schedule:
    - cron: '5 8 * * 5'  # Friday 4:05pm PHT (UTC+8 = Friday 08:05 UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Send EOW reminder
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          EMAIL_FLEIRE: ${{ secrets.EMAIL_FLEIRE }}
          EMAIL_CHARLENE: ${{ secrets.EMAIL_CHARLENE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TESTING_MODE: 'true'
        run: node eow-reminder.js

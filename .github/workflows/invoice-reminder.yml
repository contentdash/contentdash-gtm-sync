name: Monthly Invoice Checklist

on:
  schedule:
    - cron: '7 0 1 * *'  # 1st of month 8:07am PHT (UTC+8 = 00:07 UTC)
  workflow_dispatch:

jobs:
  invoice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Send invoice checklist
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          EMAIL_FLEIRE: ${{ secrets.EMAIL_FLEIRE }}
          EMAIL_CHARLENE: ${{ secrets.EMAIL_CHARLENE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node invoice-reminder.js

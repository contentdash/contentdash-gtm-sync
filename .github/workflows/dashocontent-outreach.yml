name: DashoContent Daily Outreach

on:
  schedule:
    # 9am PHT (UTC+8) Tuesday–Thursday
    - cron: '0 1 * * 2-4'
  workflow_dispatch:  # manual trigger from GitHub Actions UI

permissions:
  contents: write   # needed to commit sent-log.json back to repo

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate email queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd outreach
          python3 generate.py --leads=enriched.csv

      - name: Send batch
        env:
          RESEND_API_KEY: ${{ secrets.DASHOCONTENT_OUTREACH_RESEND_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cd outreach
          python3 send.py --batch=8 --send

      - name: Audit run health
        if: always()   # report even if Generate/Send failed, so problems surface
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cd outreach
          python3 audit.py

      - name: Commit sent log + personalization caches
        if: always()
        run: |
          git config user.name "dashocontent-bot"
          git config user.email "info@contentdash.app"
          # Persist the send record AND the research/opener caches so the next run
          # only fetches/generates for genuinely new leads (no repeat API cost).
          git add outreach/sent-log.json outreach/site_research.json outreach/personalized.json || true
          git diff --staged --quiet || git commit -m "chore: update outreach sent log + caches [skip ci]"
          git push
